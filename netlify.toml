[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "public"

[dev]
  command = "node server.js"
  port = 3000

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/callback"
  to = "/.netlify/functions/callback"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
